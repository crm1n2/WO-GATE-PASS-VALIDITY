<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WO Gate Pass Alert Center</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07111f;
color:white;
}
.header{
background:linear-gradient(90deg,#0f172a,#111827,#1e293b);
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}
.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}
.summary-card{
border-radius:16px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
font-weight:bold;
}
.summary-card h2{
font-size:38px;
margin:10px 0 0 0;
}
.total{background:linear-gradient(135deg,#f59e0b,#b45309);}
.active{background:linear-gradient(135deg,#10b981,#065f46);}
.warning{background:linear-gradient(135deg,#f97316,#9a3412);}
.expired{background:linear-gradient(135deg,#ef4444,#7f1d1d);}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:0 20px 20px 20px;
}
.filters input,
.filters select{
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
font-size:14px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111827;
border-radius:18px;
padding:18px;
border-left:8px solid #22c55e;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}
.expired-card{border-left-color:#ef4444;}
.warning-card{border-left-color:#f59e0b;}

.alert{
display:inline-block;
padding:6px 12px;
border-radius:30px;
font-size:12px;
font-weight:bold;
margin-bottom:10px;
}
.alert-active{background:#14532d;}
.alert-warning{background:#92400e;}
.alert-expired{background:#7f1d1d;}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:12px;
}
.row{
margin:8px 0;
color:#d1d5db;
line-height:1.4;
}
.row b{
color:white;
}
.details{
margin-top:12px;
background:#0f172a;
padding:10px;
border-radius:10px;
font-size:13px;
color:#cbd5e1;
}
.footer{
text-align:center;
padding:15px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
WO Gate Pass Alert Center
</div>

<div class="summary" id="summary"></div>

<div class="filters">
<input type="text" id="searchName" placeholder="Search Worker Name">
<input type="text" id="searchIP" placeholder="Search IP No">
<input type="text" id="searchGP" placeholder="Search Gate Pass">
<input type="text" id="searchIC" placeholder="Search Engg I/C">

<select id="statusFilter">
<option value="">All Status</option>
<option value="ACTIVE">Active</option>
<option value="WARNING">Expiring Soon</option>
<option value="EXPIRED">Expired</option>
</select>
</div>

<div class="container" id="dashboard"></div>

<div class="footer">
Live synced from Google Sheets • Auto refresh every 10 sec
</div>

<script>

const API =
"https://opensheet.elk.sh/1O7guxBa1XJOoBWwgzgBzRKhpG60iEgvjWMwcWIMyrYs/1";

let globalData = [];

function parseDate(str){

if(!str) return null;

str = str.trim();

let parts;

if(str.includes("/")) parts = str.split("/");
else if(str.includes(".")) parts = str.split(".");
else if(str.includes("-")) parts = str.split("-");
else return null;

if(parts.length !== 3) return null;

return new Date(
parseInt(parts[2]),
parseInt(parts[1])-1,
parseInt(parts[0])
);
}

function getStatus(issueTo){

const expiryDate = parseDate(issueTo);

if(!expiryDate) return "ACTIVE";

const today = new Date();
today.setHours(0,0,0,0);

const diffDays =
Math.ceil((expiryDate - today)/(1000*60*60*24));

if(diffDays < 0) return "EXPIRED";

if(diffDays <= 30) return "WARNING";

return "ACTIVE";
}

function latestOnly(rows){

const map = {};

rows.forEach(r => {

const key =
r["IP No"] ||
r["IP NO"] ||
r["Name of Worker"];

if(!key) return;

const current =
parseDate(r["Issue To"]);

if(!map[key]){

map[key] = r;
return;
}

const existing =
parseDate(map[key]["Issue To"]);

if(current && existing){

if(current > existing){
map[key] = r;
}
}

});

return Object.values(map);
}

function renderDashboard(data){

const dashboard =
document.getElementById("dashboard");

dashboard.innerHTML = "";

const nameFilter =
document.getElementById("searchName").value.toLowerCase();

const ipFilter =
document.getElementById("searchIP").value.toLowerCase();

const gpFilter =
document.getElementById("searchGP").value.toLowerCase();

const icFilter =
document.getElementById("searchIC").value.toLowerCase();

const statusFilter =
document.getElementById("statusFilter").value;

data.forEach(row => {

const worker =
(row["Name of Worker"] || "").toLowerCase();

const ip =
(row["IP NO"] || "").toLowerCase();

const gp =
(row["Gate Pass No"] || "").toLowerCase();

const ic =
(row["ENGG I/C"] || "").toLowerCase();

const status =
getStatus(row["Issue To"]);

if(nameFilter && !worker.includes(nameFilter)) return;
if(ipFilter && !ip.includes(ipFilter)) return;
if(gpFilter && !gp.includes(gpFilter)) return;
if(icFilter && !ic.includes(icFilter)) return;
if(statusFilter && status !== statusFilter) return;

let cardClass = "card";
let alertClass = "alert alert-active";
let alertText = "ACTIVE";

if(status === "WARNING"){
cardClass += " warning-card";
alertClass = "alert alert-warning";
alertText = "EXPIRING SOON";
}

if(status === "EXPIRED"){
cardClass += " expired-card";
alertClass = "alert alert-expired";
alertText = "EXPIRED";
}

dashboard.innerHTML += `
<div class="${cardClass}">

<div class="${alertClass}">
${alertText}
</div>

<div class="title">
${row["Name of Worker"] || "-"}
</div>

<div class="row"><b>WO NO:</b>
${row["WO NO"] || "-"}</div>

<div class="row"><b>Gate Pass:</b>
${row["Gate Pass No"] || "-"}</div>

<div class="row"><b>IP No:</b>
${row["IP NO"] || "-"}</div>

<div class="row"><b>ENGG I/C:</b>
${row["ENGG I/C"] || "-"}</div>

<div class="row"><b>Vendor:</b>
${row["VENDOR"] || "-"}</div>

<div class="row"><b>Issue From:</b>
${row["Issue From"] || "-"}</div>

<div class="row"><b>Issue To:</b>
${row["Issue To"] || "-"}</div>

<div class="details">
<b>Details:</b><br>
${row["DETAILS"] || "-"}
</div>

</div>
`;
});
}

async function loadData(){

const response = await fetch(API);
const data = await response.json();

globalData = data.filter(
x => x["Name of Worker"] &&
x["Name of Worker"] !== "Name of Worker"
);

globalData = latestOnly(globalData);

const uniqueIPs = new Set();

let active = 0;
let warning = 0;
let expired = 0;

globalData.forEach(r=>{

const ip = r["IP NO"];

if(ip){
uniqueIPs.add(ip);
}

const s = getStatus(r["Issue To"]);

if(s==="ACTIVE"){
active++;
}

if(s==="WARNING"){
active++;
warning++;
}

if(s==="EXPIRED"){
expired++;
}

});

let total = uniqueIPs.size;

document.getElementById("summary").innerHTML = `
<div class="summary-card total">
TOTAL
<h2>${total}</h2>
</div>

<div class="summary-card active">
VALID
<h2>${active}</h2>
</div>

<div class="summary-card warning">
EXPIRING
<h2>${warning}</h2>
</div>

<div class="summary-card expired">
EXPIRED
<h2>${expired}</h2>
</div>
`;

renderDashboard(globalData);
}

["searchName","searchIP","searchGP","searchIC","statusFilter"]
.forEach(id => {

document.getElementById(id)
.addEventListener("input", () => renderDashboard(globalData));

document.getElementById(id)
.addEventListener("change", () => renderDashboard(globalData));
});

loadData();

setInterval(loadData,10000);

</script>

</body>
</html>
